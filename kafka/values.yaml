# Kafka configuration for KRaft mode on Kubernetes

# Cluster Configuration
replicaCount: 3  # Number of Kafka broker replicas for high availability

# Authentication
auth:
  clientProtocol: plaintext
  interBrokerProtocol: plaintext

# Service configuration for internal access
service:
  name: atm-kafka
  type: ClusterIP
  port: 9092

# External access configuration
externalAccess:
  enabled: true
  controller:
    service:
      type: NodePort
      nodePorts: [31090, 31091, 31092]  # Ports for external access

# Persistence settings for data storage
persistence:
  enabled: true
  storageClass: "standard"  # Set to your Kubernetes storage class
  size: 2Gi  # Disk space per broker

# Disabling Zookeeper as KRaft mode does not require it
zookeeper:
  enabled: true

# KRaft Mode Configuration
kraft:
  enabled: false
  clusterId: "vKaEBaltQuqktgAA3wkccA"  # Unique cluster ID for KRaft

# Health checks for better stability
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 2

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 2
