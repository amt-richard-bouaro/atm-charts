apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atm-kafka
  namespace: atm-microservices
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: oci://registry-1.docker.io/bitnamicharts/kafka
    chart: kafka
    targetRevision: 3.8.1
    helm:
      values: |-
        replicaCount: 3
        service:
          name: atm-kafka
          type: ClusterIP
          port: 9092
        persistence:
          enabled: true
          size: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: atm-microservices
  syncPolicy:
    automated:
      prune: true
      selfHeal: true